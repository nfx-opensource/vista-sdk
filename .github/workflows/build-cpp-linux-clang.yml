name: Vista SDK C++ - Linux Clang

on:
  push:
    branches: [ cpp, main ]
    paths:
      - 'cpp/**'
      - '.github/workflows/build-cpp-linux-clang.yml'
  pull_request:
    branches: [ cpp, main ]
    paths:
      - 'cpp/**'
      - '.github/workflows/build-cpp-linux-clang.yml'

env:
  BUILD_TYPE: Release

permissions:
  contents: read

jobs:
  build-linux-clang:
    runs-on: ubuntu-24.04
    name: Ubuntu Clang 18

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build clang-18 libc++-18-dev libc++abi-18-dev ccache

    - name: Set environment variables
      run: |
        echo "CC=clang-18" >> $GITHUB_ENV
        echo "CXX=clang++-18" >> $GITHUB_ENV

    - name: Setup ccache
      run: |
        ccache --zero-stats
        ccache --show-config

    - name: Configure CMake
      working-directory: cpp
      run: |
        cmake -B build \
              -G "Unix Makefiles" \
              -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
              -DVISTA_SDK_CPP_BUILD_STATIC=ON \
              -DVISTA_SDK_CPP_BUILD_SHARED=OFF \
              -DVISTA_SDK_CPP_BUILD_TESTS=ON \
              -DVISTA_SDK_CPP_BUILD_BENCHMARKS=OFF \
              -DVISTA_SDK_CPP_BUILD_SAMPLES=OFF \
              -DVISTA_SDK_CPP_BUILD_DOCUMENTATION=OFF

    - name: Build
      working-directory: cpp
      run: cmake --build build --parallel

    - name: Test
      working-directory: cpp/build
      run: ctest --output-on-failure --parallel

    - name: Show ccache statistics
      run: ccache --show-stats

