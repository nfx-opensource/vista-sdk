name: Vista SDK C++ - Linux GCC

on:
  push:
    branches: [ cpp, main ]
    paths:
      - 'cpp/**'
      - '.github/workflows/build-cpp-linux-gcc.yml'
  pull_request:
    branches: [ cpp, main ]
    paths:
      - 'cpp/**'
      - '.github/workflows/build-cpp-linux-gcc.yml'

env:
  BUILD_TYPE: Release

permissions:
  contents: read

jobs:
  build-linux-gcc:
    runs-on: ubuntu-24.04
    name: Ubuntu GCC 14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          .deps
        key: ${{ runner.os }}-gcc-deps-${{ hashFiles('cpp/cmake/dnvVistaCppDependencies.cmake') }}
        restore-keys: |
          ${{ runner.os }}-gcc-deps-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: |
          ~/.ccache
        key: ${{ runner.os }}-gcc-ccache-${{ github.run_number }}
        restore-keys: |
          ${{ runner.os }}-gcc-ccache-

    - name: Set up build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake ninja-build gcc-14 g++-14 ccache

    - name: Set environment variables
      run: |
        echo "CC=gcc-14" >> $GITHUB_ENV
        echo "CXX=g++-14" >> $GITHUB_ENV

    - name: Setup ccache
      run: |
        export CCACHE_DIR="$HOME/.ccache"
        export CCACHE_COMPILERCHECK=content
        export CCACHE_COMPRESS=true
        export CCACHE_MAXSIZE=200M
        mkdir -p "$CCACHE_DIR"
        ccache --zero-stats
        ccache --show-config

    - name: Configure CMake
      working-directory: cpp
      run: |
        export CC="ccache gcc-14"
        export CXX="ccache g++-14"
        export CCACHE_DIR="$HOME/.ccache"
        cmake -B build \
              -G "Unix Makefiles" \
              -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
              -DVISTA_SDK_CPP_BUILD_STATIC=ON \
              -DVISTA_SDK_CPP_BUILD_SHARED=OFF \
              -DVISTA_SDK_CPP_BUILD_TESTS=ON \
              -DVISTA_SDK_CPP_BUILD_BENCHMARKS=OFF \
              -DVISTA_SDK_CPP_BUILD_SAMPLES=OFF \
              -DVISTA_SDK_CPP_BUILD_DOCUMENTATION=OFF

    - name: Build
      working-directory: cpp
      run: |
        export CCACHE_DIR="$HOME/.ccache"
        cmake --build build --parallel

    - name: Test
      working-directory: cpp/build
      run: ctest --output-on-failure --parallel

    - name: Show ccache statistics
      run: |
        export CCACHE_DIR="$HOME/.ccache"
        ccache --show-stats
