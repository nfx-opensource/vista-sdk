name: Vista SDK C++ - Windows MSVC

on:
  push:
    branches: [ cpp, main ]
    paths:
      - 'cpp/**'
      - '.github/workflows/build-cpp-windows-msvc.yml'
  pull_request:
    branches: [ cpp, main ]
    paths:
      - 'cpp/**'
      - '.github/workflows/build-cpp-windows-msvc.yml'

env:
  BUILD_TYPE: Release

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    name: Windows MSVC 2022

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          .deps
        key: ${{ runner.os }}-msvc-deps-${{ hashFiles('cpp/cmake/dnvVistaCppDependencies.cmake') }}
        restore-keys: |
          ${{ runner.os }}-msvc-deps-

    - name: Cache sccache
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.temp }}/sccache
        key: ${{ runner.os }}-msvc-sccache-${{ github.run_number }}
        restore-keys: |
          ${{ runner.os }}-msvc-sccache-

    - name: Install sccache
      run: |
        $url = "https://github.com/mozilla/sccache/releases/download/v0.8.2/sccache-v0.8.2-x86_64-pc-windows-msvc.zip"
        Invoke-WebRequest -Uri $url -OutFile sccache.zip
        Expand-Archive sccache.zip -DestinationPath .
        Move-Item sccache-*/sccache.exe C:/Windows/System32/

    - name: Setup sccache
      run: |
        $env:SCCACHE_DIR = "${{ runner.temp }}/sccache"
        $env:SCCACHE_CACHE_SIZE = "200M"
        New-Item -ItemType Directory -Force -Path $env:SCCACHE_DIR
        sccache --zero-stats
        sccache --show-stats
        # Set environment variables for all subsequent steps
        echo "SCCACHE_DIR=${{ runner.temp }}/sccache" >> $env:GITHUB_ENV
        echo "SCCACHE_CACHE_SIZE=200M" >> $env:GITHUB_ENV

    - name: Configure CMake
      working-directory: cpp
      run: |
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DVISTA_SDK_CPP_BUILD_STATIC=ON -DVISTA_SDK_CPP_BUILD_SHARED=OFF -DVISTA_SDK_CPP_BUILD_TESTS=ON -DVISTA_SDK_CPP_BUILD_BENCHMARKS=OFF -DVISTA_SDK_CPP_BUILD_SAMPLES=OFF -DVISTA_SDK_CPP_BUILD_DOCUMENTATION=OFF -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Build
      working-directory: cpp
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Test
      working-directory: cpp/build
      run: ctest --output-on-failure --parallel

    - name: Show sccache statistics
      run: sccache --show-stats
